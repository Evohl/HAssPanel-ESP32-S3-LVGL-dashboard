; ============================================================
;  PlatformIO – Home Assistant Panel (LVGL)
;  Board: ESP32-8048S070 (ESP32-S3, 16 MB Flash, 8 MB OPI-PSRAM)
;  Universelle Anzeigetafel für Home Assistant Entities
; ============================================================

[platformio]
src_dir = .

[env:ha_panel]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash & PSRAM ────────────────────────────────────────────
board_build.flash_size          = 16MB
board_build.flash_mode          = qio
board_build.partitions          = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216

; ── Upload & Monitor ─────────────────────────────────────────
upload_speed  = 460800
monitor_speed = 115200
upload_protocol           = esptool
monitor_filters           = esp32_exception_decoder

; ── Build-Flags ──────────────────────────────────────────────
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -mfix-esp32-psram-cache-issue
  -DLV_CONF_INCLUDE_SIMPLE
  ; LVGL: Fonts explizit aktivieren (umgeht GCC __has_include Bug)
  -DLV_FONT_MONTSERRAT_12=1
  -DLV_FONT_MONTSERRAT_14=1
  -DLV_FONT_MONTSERRAT_16=1
  -DLV_FONT_MONTSERRAT_20=1
  -DLV_FONT_MONTSERRAT_28=1
  ; LVGL: Tick via millis() (Defaults in lv_conf_internal.h passen)
  -DLV_TICK_CUSTOM=1
  ; LVGL: Dark Theme
  -DLV_THEME_DEFAULT_DARK=1

; ── Bibliotheken ─────────────────────────────────────────────
lib_deps =
  moononournation/GFX Library for Arduino@1.4.9
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.0.0
  tamctec/TAMC_GT911@^1.0.2
  lvgl/lvgl@^8.3.0

; ── OTA Upload (IP anpassen oder hassPanel.local nutzen) ─────
[env:ha_panel_ota]
extends         = env:ha_panel
upload_protocol = espota
upload_port     = 10.10.200.157
upload_flags    = --host_ip=10.10.200.2

lib_extra_dirs = ~/Arduino/libraries
